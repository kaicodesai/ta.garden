<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Profile — Ta.Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark:  #1a1a18;
  --cream: #ede0d1;
  --teal:  #86a2a6;
  --terra: #a0856c;
  --light: #f5f0eb;
  --mid:   #88917d;
  --white: #fefcfa;
  --green: #4caf7d;
  --red:   #b85c5c;
}
body { font-family: 'Jost', sans-serif; font-weight: 300; background: #f0ebe4; color: var(--dark); min-height: 100vh; }

.topbar { background: var(--dark); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
.brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--cream); letter-spacing: 0.08em; }
.brand-sub { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal); margin-left: 4px; }

.wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }

.booking-card { background: var(--dark); color: var(--cream); padding: 24px 28px; margin-bottom: 32px; }
.booking-room { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; margin-bottom: 4px; }
.booking-meta { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; }
.booking-dates { display: flex; gap: 32px; font-size: 13px; }
.booking-date-lbl { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(237,224,209,0.45); margin-bottom: 3px; }

.section { background: var(--white); border: 1px solid rgba(136,145,125,0.14); padding: 28px; margin-bottom: 16px; }
.section-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid); margin-bottom: 20px; border-bottom: 1px solid rgba(136,145,125,0.15); padding-bottom: 10px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 540px) { .form-grid { grid-template-columns: 1fr; } }
.full { grid-column: 1 / -1; }

.fg { display: flex; flex-direction: column; gap: 6px; }
.fl { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mid); }
.fc { padding: 11px 13px; background: var(--light); border: 1px solid rgba(136,145,125,0.22); color: var(--dark); font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300; outline: none; width: 100%; transition: border-color 0.2s; }
.fc:focus { border-color: var(--teal); }

.upload-area { border: 2px dashed rgba(136,145,125,0.3); padding: 28px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
.upload-area:hover, .upload-area.drag { border-color: var(--teal); background: rgba(134,162,166,0.05); }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-label { font-size: 12px; color: var(--mid); line-height: 1.7; }
.upload-label strong { color: var(--dark); font-weight: 400; }
.upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-preview { width: 100%; max-height: 220px; object-fit: contain; border-radius: 2px; display: block; margin-top: 12px; }
.upload-name { font-size: 11px; color: var(--teal); margin-top: 8px; }
.upload-clear { font-size: 10px; color: var(--red); cursor: pointer; margin-top: 4px; display: inline-block; }

.submit-btn { width: 100%; padding: 16px; background: var(--dark); color: var(--cream); border: none; font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
.submit-btn:hover:not(:disabled) { opacity: 0.85; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.err-msg { font-size: 12px; color: var(--red); margin-top: 8px; min-height: 16px; }

.success-wrap { text-align: center; padding: 60px 24px; }
.success-icon { font-size: 48px; margin-bottom: 20px; }
.success-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; margin-bottom: 12px; }
.success-sub { font-size: 14px; color: var(--mid); line-height: 1.8; max-width: 420px; margin: 0 auto; }

.not-found { text-align: center; padding: 80px 24px; }
.not-found-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; margin-bottom: 10px; }
.not-found-sub { font-size: 13px; color: var(--mid); }

.required-note { font-size: 11px; color: var(--mid); margin-bottom: 20px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Ta.Garden</div>
  <div class="brand-sub">Cam Nam Island · Hội An</div>
</div>

<div class="wrap" id="mainWrap">
  <div class="loading" style="text-align:center;padding:60px;color:var(--mid);">Loading your booking…</div>
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return MONTHS[+m-1]+' '+ +d+', '+y;
}

const params = new URLSearchParams(location.search);
const enqId  = params.get('id');
const propId = params.get('p') || 'ta-garden';

let passportData = null;
let visaData = null;

async function init() {
  const wrap = document.getElementById('mainWrap');
  if (!enqId) {
    wrap.innerHTML = `<div class="not-found"><div class="not-found-title">Invalid Link</div><div class="not-found-sub">This guest portal link is not valid.<br>Please check your confirmation email for the correct link.</div></div>`;
    return;
  }

  try {
    const r = await fetch(`/api/guest?id=${enqId}&p=${propId}`);
    if (!r.ok) throw new Error('Not found');
    const enq = await r.json();

    if (enq.profileSubmitted) {
      wrap.innerHTML = `<div class="success-wrap">
        <div class="success-icon">✓</div>
        <div class="success-title">Profile Already Submitted</div>
        <div class="success-sub">Thank you, ${enq.name ? enq.name.split(' ')[0] : 'there'}. We've received your details and documents. Our team will be in touch if anything else is needed.</div>
      </div>`;
      return;
    }

    if (enq.status === 'cancelled') {
      wrap.innerHTML = `<div class="not-found"><div class="not-found-title">Booking Cancelled</div><div class="not-found-sub">This booking has been cancelled. Please contact us if you have any questions.</div></div>`;
      return;
    }

    renderForm(enq);
  } catch (e) {
    wrap.innerHTML = `<div class="not-found"><div class="not-found-title">Not Found</div><div class="not-found-sub">We couldn't find your booking. Please check your confirmation email for the correct link or contact us at <a href="mailto:hi@soulandlunawellness.com" style="color:var(--terra);">hi@soulandlunawellness.com</a>.</div></div>`;
  }
}

function renderForm(enq) {
  const wrap = document.getElementById('mainWrap');
  wrap.innerHTML = `
    <div class="booking-card">
      <div class="booking-room">${enq.room}</div>
      <div class="booking-meta">${enq.stayType === 'monthly' ? 'Monthly Stay' : 'Short Stay'} · Ta.Garden</div>
      <div class="booking-dates">
        <div>
          <div class="booking-date-lbl">Check-in</div>
          <div>${fmt(enq.checkIn)}</div>
        </div>
        <div>
          <div class="booking-date-lbl">Check-out</div>
          <div>${fmt(enq.checkOut)}</div>
        </div>
      </div>
    </div>

    <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:8px;">Welcome, ${enq.name ? enq.name.split(' ')[0] : 'Guest'}.</div>
    <div style="font-size:14px;color:var(--mid);line-height:1.8;margin-bottom:28px;">Please complete your guest profile below. This information helps us prepare for your arrival and is required for Vietnamese visa compliance. Your documents are stored securely and used only for registration purposes.</div>

    <form id="guestForm" onsubmit="submitForm(event)">

      <div class="section">
        <div class="section-title">Personal Information</div>
        <p class="required-note">All fields are required unless marked optional.</p>
        <div class="form-grid">
          <div class="fg full">
            <label class="fl">Full Name (as on passport)</label>
            <input type="text" class="fc" id="fullName" value="${enq.name || ''}" required>
          </div>
          <div class="fg">
            <label class="fl">Date of Birth</label>
            <input type="date" class="fc" id="dateOfBirth" required>
          </div>
          <div class="fg">
            <label class="fl">Nationality</label>
            <input type="text" class="fc" id="nationality" placeholder="e.g. Australian" required>
          </div>
          <div class="fg">
            <label class="fl">Passport Number</label>
            <input type="text" class="fc" id="passportNumber" placeholder="e.g. PA123456" required>
          </div>
          <div class="fg">
            <label class="fl">Passport Expiry Date</label>
            <input type="date" class="fc" id="passportExpiry">
          </div>
          <div class="fg full">
            <label class="fl">Home Address</label>
            <input type="text" class="fc" id="homeAddress" placeholder="Street, City, Country" required>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Emergency Contact</div>
        <div class="form-grid">
          <div class="fg">
            <label class="fl">Contact Name</label>
            <input type="text" class="fc" id="emergencyName" placeholder="Full name" required>
          </div>
          <div class="fg">
            <label class="fl">Contact Phone (with country code)</label>
            <input type="tel" class="fc" id="emergencyPhone" placeholder="+1 555 000 0000" required>
          </div>
          <div class="fg full">
            <label class="fl">Relationship</label>
            <input type="text" class="fc" id="emergencyRelation" placeholder="e.g. Partner, Parent">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Documents</div>
        <div style="font-size:13px;color:var(--mid);line-height:1.8;margin-bottom:20px;">Please upload a clear photo of your passport photo page and your visa stamp or e-visa document. JPG, PNG or PDF accepted. Max 10MB each.</div>
        <div class="form-grid">
          <div class="fg">
            <label class="fl">Passport Photo Page</label>
            <div class="upload-area" id="passportArea">
              <div class="upload-icon">🪪</div>
              <div class="upload-label"><strong>Click to upload</strong> or drag &amp; drop<br>Passport photo page</div>
              <input type="file" class="upload-input" id="passportFile" accept="image/*,.pdf" onchange="handleFile('passport',this)">
              <img id="passportPreview" class="upload-preview" style="display:none">
              <div id="passportName" class="upload-name"></div>
              <span id="passportClear" class="upload-clear" style="display:none" onclick="clearFile('passport')">✕ Remove</span>
            </div>
          </div>
          <div class="fg">
            <label class="fl">Visa Stamp / E-Visa Document</label>
            <div class="upload-area" id="visaArea">
              <div class="upload-icon">📄</div>
              <div class="upload-label"><strong>Click to upload</strong> or drag &amp; drop<br>Visa stamp or e-visa</div>
              <input type="file" class="upload-input" id="visaFile" accept="image/*,.pdf" onchange="handleFile('visa',this)">
              <img id="visaPreview" class="upload-preview" style="display:none">
              <div id="visaName" class="upload-name"></div>
              <span id="visaClear" class="upload-clear" style="display:none" onclick="clearFile('visa')">✕ Remove</span>
            </div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--mid);margin-top:12px;">Don't have your visa yet? You can submit the form now and we'll follow up. Upload what you have — you can share the rest directly with us via email.</div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit Guest Profile →</button>
      <div class="err-msg" id="errMsg"></div>
    </form>`;

  setupDragDrop('passportArea', 'passport');
  setupDragDrop('visaArea', 'visa');
}

function handleFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    document.getElementById('errMsg').textContent = `${type === 'passport' ? 'Passport' : 'Visa'} file exceeds 10MB. Please compress the image and try again.`;
    input.value = '';
    return;
  }
  document.getElementById('errMsg').textContent = '';
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = e.target.result;
    if (type === 'passport') passportData = data;
    else visaData = data;

    const preview = document.getElementById(type + 'Preview');
    const nameEl  = document.getElementById(type + 'Name');
    const clearEl = document.getElementById(type + 'Clear');
    if (file.type.startsWith('image/')) {
      preview.src = data;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
    nameEl.textContent = file.name;
    clearEl.style.display = 'inline';
  };
  reader.readAsDataURL(file);
}

function clearFile(type) {
  if (type === 'passport') {
    passportData = null;
    document.getElementById('passportFile').value = '';
    document.getElementById('passportPreview').style.display = 'none';
    document.getElementById('passportName').textContent = '';
    document.getElementById('passportClear').style.display = 'none';
  } else {
    visaData = null;
    document.getElementById('visaFile').value = '';
    document.getElementById('visaPreview').style.display = 'none';
    document.getElementById('visaName').textContent = '';
    document.getElementById('visaClear').style.display = 'none';
  }
}

function setupDragDrop(areaId, type) {
  const area = document.getElementById(areaId);
  if (!area) return;
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag'));
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const input = document.getElementById(type + 'File');
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    handleFile(type, input);
  });
}

async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  err.textContent = '';

  const body = {
    id: enqId,
    propertyId: propId,
    fullName:        document.getElementById('fullName').value.trim(),
    dateOfBirth:     document.getElementById('dateOfBirth').value,
    nationality:     document.getElementById('nationality').value.trim(),
    passportNumber:  document.getElementById('passportNumber').value.trim(),
    passportExpiry:  document.getElementById('passportExpiry').value,
    homeAddress:     document.getElementById('homeAddress').value.trim(),
    emergencyName:   document.getElementById('emergencyName').value.trim(),
    emergencyPhone:  document.getElementById('emergencyPhone').value.trim(),
    emergencyRelation: document.getElementById('emergencyRelation').value.trim(),
    passport: passportData,
    visa:     visaData,
  };

  try {
    const r = await fetch('/api/guest/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('mainWrap').innerHTML = `<div class="success-wrap">
        <div class="success-icon">✓</div>
        <div class="success-title">Profile Submitted</div>
        <div class="success-sub">Thank you, ${body.fullName.split(' ')[0]}. We've received your details and documents. We'll be in touch closer to your arrival with check-in information.<br><br>Questions? Email us at <a href="mailto:hi@soulandlunawellness.com" style="color:var(--terra);">hi@soulandlunawellness.com</a></div>
      </div>`;
    } else {
      throw new Error(d.error || 'Submission failed');
    }
  } catch (ex) {
    err.textContent = 'Something went wrong: ' + ex.message + '. Please try again or email us directly.';
    btn.disabled = false;
    btn.textContent = 'Submit Guest Profile →';
  }
}

init();
</script>
</body>
</html>
