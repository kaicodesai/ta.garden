<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Portal — Ta.Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark:  #1a1a18;
  --cream: #ede0d1;
  --teal:  #86a2a6;
  --terra: #a0856c;
  --light: #f5f0eb;
  --mid:   #88917d;
  --white: #fefcfa;
  --green: #4caf7d;
  --red:   #b85c5c;
}
body { font-family: 'Jost', sans-serif; font-weight: 300; background: #f0ebe4; color: var(--dark); min-height: 100vh; }

.topbar { background: var(--dark); padding: 0 28px; height: 56px; display: flex; align-items: center; gap: 12px; }
.brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--cream); letter-spacing: 0.08em; }
.brand-sub { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.topbar-name { font-size: 12px; color: rgba(237,224,209,0.5); }
.signout-btn { padding: 6px 14px; background: none; border: 1px solid rgba(237,224,209,0.15); color: rgba(237,224,209,0.45); font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.signout-btn:hover { border-color: rgba(237,224,209,0.4); color: var(--cream); }

.screen { display: none; }
.screen.on { display: block; }

/* ── Centred screens (login / check email / loading / error) ── */
.center-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 56px); padding: 32px 20px; }
.center-box { background: var(--white); padding: 44px 40px; width: 100%; max-width: 440px; border: 1px solid rgba(136,145,125,0.14); }
@media (max-width: 480px) { .center-box { padding: 32px 24px; } }
.screen-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; margin-bottom: 10px; }
.screen-sub { font-size: 13px; color: var(--mid); line-height: 1.8; margin-bottom: 0; }

.fg { display: flex; flex-direction: column; gap: 6px; }
.fl { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mid); }
.fc { padding: 12px 14px; background: var(--light); border: 1px solid rgba(136,145,125,0.22); color: var(--dark); font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300; outline: none; width: 100%; transition: border-color 0.2s; }
.fc:focus { border-color: var(--teal); }
.primary-btn { padding: 14px 24px; background: var(--dark); color: var(--cream); border: none; font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; width: 100%; margin-top: 16px; }
.primary-btn:hover:not(:disabled) { opacity: 0.85; }
.primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.secondary-btn { padding: 10px 20px; background: none; border: 1px solid rgba(136,145,125,0.3); color: var(--mid); font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.secondary-btn:hover { border-color: var(--dark); color: var(--dark); }
.status-line { font-size: 12px; margin-top: 10px; min-height: 16px; }
.status-line.err { color: var(--red); }
.status-line.ok  { color: var(--teal); }

/* ── Portal layout ── */
.portal-wrap { max-width: 760px; margin: 0 auto; padding: 36px 20px 80px; }

/* Booking card */
.booking-card { background: var(--dark); color: var(--cream); padding: 24px 28px; margin-bottom: 28px; }
.booking-room { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; margin-bottom: 4px; }
.booking-meta { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; }
.booking-dates { display: flex; gap: 20px; font-size: 13px; flex-wrap: wrap; }
.booking-dates > div { min-width: 70px; }
.booking-date-lbl { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(237,224,209,0.4); margin-bottom: 3px; }
.status-pill { display: inline-block; padding: 3px 10px; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; border: 1px solid; border-radius: 1px; }
.status-pill.confirmed { border-color: var(--green); color: var(--green); }
.status-pill.pending   { border-color: rgba(200,146,42,0.6); color: #c8922a; }

/* Sections */
.section { background: var(--white); border: 1px solid rgba(136,145,125,0.14); padding: 26px 28px; margin-bottom: 14px; }
.section-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid); margin-bottom: 18px; border-bottom: 1px solid rgba(136,145,125,0.12); padding-bottom: 10px; }

/* Onboarding checklist */
.ob-list { display: flex; flex-direction: column; gap: 8px; }
.ob-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--light); border: 1px solid rgba(136,145,125,0.12); }
.ob-icon { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(136,145,125,0.3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; }
.ob-icon.done { background: var(--green); border-color: var(--green); color: #fff; }
.ob-label { font-size: 13px; }
.ob-label.done { color: var(--dark); }
.ob-label.pending { color: var(--mid); }

/* Profile section */
.profile-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 500px) { .profile-summary { grid-template-columns: 1fr; } }
.profile-field { display: flex; flex-direction: column; gap: 3px; }
.profile-key { font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--mid); }
.profile-val { font-size: 13px; color: var(--dark); }
.profile-cta { background: rgba(134,162,166,0.07); border: 1px dashed rgba(134,162,166,0.35); padding: 20px; text-align: center; }
.profile-cta-text { font-size: 13px; color: var(--mid); margin-bottom: 12px; line-height: 1.7; }

/* Profile form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 540px) { .form-grid { grid-template-columns: 1fr; } }
.full { grid-column: 1 / -1; }
.upload-area { border: 2px dashed rgba(136,145,125,0.3); padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
.upload-area:hover, .upload-area.drag { border-color: var(--teal); background: rgba(134,162,166,0.05); }
.upload-icon { font-size: 24px; margin-bottom: 6px; }
.upload-label { font-size: 12px; color: var(--mid); line-height: 1.6; }
.upload-label strong { color: var(--dark); font-weight: 400; }
.upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-preview { width: 100%; max-height: 180px; object-fit: contain; border-radius: 2px; display: none; margin-top: 10px; }
.upload-name { font-size: 11px; color: var(--teal); margin-top: 6px; }
.upload-clear { font-size: 10px; color: var(--red); cursor: pointer; margin-top: 4px; display: none; }
.submit-btn { width: 100%; padding: 16px; background: var(--dark); color: var(--cream); border: none; font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
.submit-btn:hover:not(:disabled) { opacity: 0.85; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.err-msg { font-size: 12px; color: var(--red); margin-top: 8px; min-height: 16px; }
.form-note { font-size: 11px; color: var(--mid); line-height: 1.7; margin-bottom: 18px; }

/* Payments */
.payment-cta { display: block; width: 100%; padding: 15px; background: var(--teal); color: #fff; text-align: center; text-decoration: none; font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 18px; transition: opacity 0.2s; }
.payment-cta:hover { opacity: 0.88; }
.payment-list { display: flex; flex-direction: column; gap: 0; }
.payment-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(136,145,125,0.1); }
.payment-row:last-child { border-bottom: none; }
.payment-date { font-size: 11px; color: var(--mid); min-width: 80px; }
.payment-amount { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; }
.payment-note { font-size: 12px; color: var(--mid); flex: 1; padding: 0 12px; }
.payment-check { color: var(--green); font-size: 14px; }
.payment-empty { font-size: 13px; color: var(--mid); padding: 8px 0; }
.payment-total { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; margin-top: 6px; border-top: 1px solid rgba(136,145,125,0.18); }
.payment-total-lbl { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mid); }
.payment-total-val { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Ta.Garden</div>
  <div class="brand-sub">Guest Portal</div>
  <div class="topbar-right" id="topbarRight"></div>
</div>

<!-- Login -->
<div id="screen-login" class="screen">
  <div class="center-wrap">
    <div class="center-box">
      <div class="screen-title">Welcome back.</div>
      <div class="screen-sub" style="margin-bottom:28px;">Enter your booking email to receive a secure login link.</div>
      <div class="fg">
        <label class="fl">Email Address</label>
        <input type="email" class="fc" id="loginEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doRequestLogin()">
      </div>
      <button class="primary-btn" id="loginBtn" onclick="doRequestLogin()">Send Login Link →</button>
      <div class="status-line" id="loginStatus"></div>
    </div>
  </div>
</div>

<!-- Check Email -->
<div id="screen-check-email" class="screen">
  <div class="center-wrap">
    <div class="center-box" style="text-align:center;">
      <div style="font-size:40px;margin-bottom:18px;">✉</div>
      <div class="screen-title">Check your inbox.</div>
      <div class="screen-sub">We sent a login link to <strong id="checkEmailAddr"></strong>.<br>Click it to access your portal — it expires in 1 hour.</div>
      <button class="secondary-btn" onclick="showScreen('login')" style="margin-top:28px;">Use a different email</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="screen-loading" class="screen">
  <div class="center-wrap">
    <div style="text-align:center;color:var(--mid);font-size:13px;">Loading your portal…</div>
  </div>
</div>

<!-- Error -->
<div id="screen-error" class="screen">
  <div class="center-wrap">
    <div class="center-box" style="text-align:center;">
      <div class="screen-title" style="color:var(--red);">Something went wrong.</div>
      <div class="screen-sub" id="errScreenMsg" style="margin-top:10px;margin-bottom:24px;">Please try again or contact us at hi@soulandlunawellness.com</div>
      <button class="secondary-btn" onclick="showScreen('login')">Try Again</button>
    </div>
  </div>
</div>

<!-- Portal -->
<div id="screen-portal" class="screen">
  <div class="portal-wrap" id="portalContent"></div>
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const STRIPE_LINK = 'https://buy.stripe.com/7sY6oH1rO3CJeMJehC53O02';

let session = null; // { enquiryId, propId, name, email, room, stayType, checkIn, checkOut, status, onboarding, profile, payments }
let passportData = null, visaData = null;

function fmt(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return MONTHS[+m-1] + ' ' + (+d) + ', ' + y;
}

function fmtAmt(amount, currency) {
  if (!amount) return '—';
  if (currency === 'VND') return Number(amount).toLocaleString() + ' ₫';
  if (currency === 'USD') return '$' + Number(amount).toLocaleString();
  return Number(amount).toLocaleString() + ' ' + currency;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById('screen-' + name).classList.add('on');
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  const id     = params.get('id');
  const p      = params.get('p') || 'ta-garden';

  // Restore session from sessionStorage
  const saved = sessionStorage.getItem('tg_guest');
  if (saved && !token && !id) {
    session = JSON.parse(saved);
    renderPortal();
    showScreen('portal');
    return;
  }

  if (token) {
    showScreen('loading');
    try {
      const r = await fetch(`/api/guest/verify-token?token=${token}`);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Token invalid');
      session = d;
      sessionStorage.setItem('tg_guest', JSON.stringify(session));
      // Clean URL
      history.replaceState(null, '', '/guest.html');
      renderPortal();
      showScreen('portal');
    } catch (e) {
      document.getElementById('errScreenMsg').textContent = e.message === 'Token expired or invalid'
        ? 'This login link has expired or already been used. Please request a new one.'
        : 'Could not verify your login link. Please try again.';
      showScreen('error');
    }
    return;
  }

  if (id) {
    showScreen('loading');
    try {
      const r = await fetch(`/api/guest?id=${id}&p=${p}`);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Not found');
      session = d;
      sessionStorage.setItem('tg_guest', JSON.stringify(session));
      history.replaceState(null, '', '/guest.html');
      renderPortal();
      showScreen('portal');
    } catch (e) {
      document.getElementById('errScreenMsg').textContent = 'We couldn\'t load your portal. Please try the link in your confirmation email, or contact us at hi@soulandlunawellness.com';
      showScreen('error');
    }
    return;
  }

  showScreen('login');
}

// ── Login ─────────────────────────────────────────────────────────────────────

async function doRequestLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const status = document.getElementById('loginStatus');
  const btn = document.getElementById('loginBtn');
  if (!email) { status.className = 'status-line err'; status.textContent = 'Please enter your email address.'; return; }
  btn.disabled = true; btn.textContent = 'Sending…';
  status.className = 'status-line'; status.textContent = '';
  try {
    await fetch('/api/guest/request-login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    document.getElementById('checkEmailAddr').textContent = email;
    showScreen('check-email');
  } catch {
    status.className = 'status-line err'; status.textContent = 'Could not send email. Please try again.';
  }
  btn.disabled = false; btn.textContent = 'Send Login Link →';
}

function doSignOut() {
  sessionStorage.removeItem('tg_guest');
  session = null;
  document.getElementById('topbarRight').innerHTML = '';
  document.getElementById('loginEmail').value = '';
  showScreen('login');
}

// ── Portal render ─────────────────────────────────────────────────────────────

function renderPortal() {
  // Topbar
  document.getElementById('topbarRight').innerHTML = `
    <span class="topbar-name">${session.name || ''}</span>
    <button class="signout-btn" onclick="doSignOut()">Sign Out</button>`;

  const ob = session.onboarding || {};
  const depositDone = session.depositReceived || ob.depositReceived || ob.paymentReceived;
  const balanceDone = session.balanceReceived || ob.balanceReceived || ob.paymentReceived;
  const obItems = [
    { key: 'depositReceived',  label: 'Deposit received',         done: depositDone },
    { key: 'balanceReceived',  label: 'Balance received',          done: balanceDone },
    { key: 'contractSigned',   label: 'House agreement signed',    done: !!ob.contractSigned },
    { key: 'passportUploaded', label: 'Passport photo uploaded',   done: !!ob.passportUploaded },
    { key: 'visaUploaded',     label: 'Visa document uploaded',    done: !!ob.visaUploaded },
  ];
  const obDone = obItems.filter(i => i.done).length;

  const payments = session.payments || [];
  const sameVND  = payments.every(p => p.currency === 'VND' || !p.currency);
  const total    = payments.reduce((s, p) => s + Number(p.amount), 0);
  const showTotal = payments.length > 1;

  document.getElementById('portalContent').innerHTML = `
    <!-- Booking -->
    <div class="booking-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div class="booking-room">${session.room || 'Ta.Garden'}</div>
          <div class="booking-meta">${session.stayType === 'monthly' ? 'Monthly Stay' : 'Short Stay'} · Ta.Garden, Hội An</div>
        </div>
        <span class="status-pill ${session.status}">${session.status || 'pending'}</span>
      </div>
      <div class="booking-dates">
        <div><div class="booking-date-lbl">Check-in</div><div>${fmt(session.checkIn)}</div></div>
        <div><div class="booking-date-lbl">Check-out</div><div>${fmt(session.checkOut)}</div></div>
        ${session.rentUsd ? `<div><div class="booking-date-lbl">Monthly Rent</div>${session.rentVnd ? `<div>${Number(session.rentVnd).toLocaleString()} ₫</div><div style="font-size:10px;color:rgba(237,224,209,0.5);margin-top:2px;">≈ $${session.rentUsd} USD</div>` : `<div>$${session.rentUsd}</div>`}</div>` : ''}
        ${(() => {
          if (!session.depositAmount) return '';
          const depVnd = session.depositAmount * 25000;
          return `<div><div class="booking-date-lbl">Security Deposit</div><div>${depVnd.toLocaleString()} ₫</div><div style="font-size:10px;color:rgba(237,224,209,0.5);margin-top:2px;">≈ $${session.depositAmount} USD</div></div>`;
        })()}
        ${(() => {
          if (!session.rentUsd || !session.checkIn || !session.checkOut) return '';
          const days = Math.round((new Date(session.checkOut) - new Date(session.checkIn)) / 86400000);
          const months = Math.round((days / 30) * 10) / 10;
          const proratedUsd = Math.round(months * session.rentUsd);
          const dep = session.depositAmount || session.rentUsd;
          const totalUsd = proratedUsd + dep;
          const totalVnd = totalUsd * 25000;
          const isProrated = proratedUsd !== session.rentUsd;
          return `<div><div class="booking-date-lbl">Cost of Stay</div><div>$${totalUsd}</div><div style="font-size:10px;color:rgba(237,224,209,0.5);margin-top:2px;">${totalVnd.toLocaleString()} VND</div>${isProrated ? `<div style="font-size:10px;color:rgba(237,224,209,0.4);margin-top:1px;">$${proratedUsd} rent + $${dep} dep</div>` : ''}</div>`;
        })()}
      </div>
    </div>

    <!-- Onboarding progress -->
    <div class="section">
      <div class="section-title">Arrival Checklist — ${obDone}/${obItems.length} Complete</div>
      <div class="ob-list">
        ${obItems.map(item => `
          <div class="ob-item">
            <div class="ob-icon${item.done ? ' done' : ''}">
              ${item.done ? '✓' : ''}
            </div>
            <span class="ob-label${item.done ? ' done' : ' pending'}">${item.label}</span>
          </div>`).join('')}
      </div>
    </div>

    <!-- Payments -->
    ${(() => {
      const STRIPE_FALLBACK_G = 'https://buy.stripe.com/28E6oHeeA3CJ9spehC53O03';
      const STRIPE_GUEST = {
        'The River Room':  { depositLink: 'https://buy.stripe.com/6oUaEX1rO5KR0VTflG53O09', rentLink: 'https://buy.stripe.com/bJe4gz3zW5KRawtb5q53O08' },
        'The Garden Room': { depositLink: 'https://buy.stripe.com/3cI6oH5I42yF341ddy53O07', rentLink: 'https://buy.stripe.com/5kQeVdfiE0qxeMJ0qM53O06' },
        'The Sky Suite':   { depositLink: 'https://buy.stripe.com/fZu4gz1rOgpvawt3CY53O05', rentLink: 'https://buy.stripe.com/4gMfZhgmIflrgUR7Te53O04' },
      };
      const RATES_G = { 'The River Room': { depositVnd: 4000000, deposit: 160 }, 'The Garden Room': { depositVnd: 4500000, deposit: 180 }, 'The Sky Suite': { depositVnd: 7000000, deposit: 280 } };
      const rawLinks = STRIPE_GUEST[session.room] || {};
      const links = {
        depositLink: rawLinks.depositLink && !rawLinks.depositLink.includes('REPLACE') ? rawLinks.depositLink : STRIPE_FALLBACK_G,
        rentLink: rawLinks.rentLink && !rawLinks.rentLink.includes('REPLACE') ? rawLinks.rentLink : STRIPE_FALLBACK_G,
      };
      const rates = RATES_G[session.room] || {};
      const depVnd = session.depositAmount ? session.depositAmount * 25000 : (rates.depositVnd || 0);
      const depUsd = session.depositAmount || rates.deposit || 0;
      const balVnd = session.rentVnd || (session.rentUsd ? session.rentUsd * 25000 : 0);
      const balUsd = session.rentUsd || 0;
      if (balanceDone) return `<div class="section"><div class="section-title">Payments</div><div style="color:var(--green,#4caf50);font-weight:600;font-size:14px;">✓ All payments received</div></div>`;
      if (depositDone) {
        let balDueHtml = '';
        if (session.checkIn) {
          const dueDate = new Date(new Date(session.checkIn).getTime() - 14 * 86400000);
          const daysLeft = Math.ceil((dueDate - Date.now()) / 86400000);
          const urgColor = daysLeft <= 7 ? '#e65100' : '#1565c0';
          balDueHtml = `<div style="margin-bottom:10px;padding:10px 12px;background:#f5f0eb;border-radius:4px;font-size:12px;color:${urgColor};">📅 First month's rent due by <strong>${dueDate.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'})}</strong>${daysLeft > 0 ? ' ('+daysLeft+' days)' : ' — due now'}</div>`;
        }
        return `<div class="section"><div class="section-title">Payments</div><div style="color:var(--green,#4caf50);font-size:13px;margin-bottom:10px;">✓ Security deposit received</div>${balDueHtml}${links.rentLink ? `<a href="${links.rentLink}" style="display:block;padding:13px 20px;background:var(--dark,#3a3a2a);color:var(--cream,#ede0d1);text-decoration:none;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;text-align:center;">Pay First Month's Rent — ${balVnd.toLocaleString()} VND${balUsd?' (~$'+balUsd+')':''} →</a>` : ''}</div>`;
      }
      let countdownHtml = '';
      if (session.confirmedAt) {
        const dueMs = new Date(session.confirmedAt).getTime() + 72 * 3600000;

function showProfileForm() {
  document.getElementById('profileCta').style.display = 'none';
  document.getElementById('profileForm').style.display = '';
  setupProfileForm();
}

function setupProfileForm() {
  setupDragDrop('passportArea', 'passport');
  setupDragDrop('visaArea', 'visa');
}

// ── Profile form submission ───────────────────────────────────────────────────

function handleFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    document.getElementById('profileErrMsg').textContent = `File exceeds 10 MB. Please compress and try again.`;
    input.value = ''; return;
  }
  document.getElementById('profileErrMsg').textContent = '';
  const reader = new FileReader();
  reader.onload = e => {
    const data = e.target.result;
    if (type === 'passport') passportData = data;
    else visaData = data;
    const preview = document.getElementById(type + 'Preview');
    const nameEl  = document.getElementById(type + 'Name');
    const clearEl = document.getElementById(type + 'Clear');
    if (file.type.startsWith('image/')) { preview.src = data; preview.style.display = 'block'; }
    else preview.style.display = 'none';
    nameEl.textContent = file.name;
    clearEl.style.display = 'inline';
  };
  reader.readAsDataURL(file);
}

function clearFile(type) {
  if (type === 'passport') passportData = null;
  else visaData = null;
  document.getElementById(type + 'File').value = '';
  document.getElementById(type + 'Preview').style.display = 'none';
  document.getElementById(type + 'Name').textContent = '';
  document.getElementById(type + 'Clear').style.display = 'none';
}

function setupDragDrop(areaId, type) {
  const area = document.getElementById(areaId);
  if (!area) return;
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag'));
  area.addEventListener('drop', e => {
    e.preventDefault(); area.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const input = document.getElementById(type + 'File');
    const dt = new DataTransfer(); dt.items.add(file);
    input.files = dt.files; handleFile(type, input);
  });
}

async function submitProfile() {
  const btn = document.getElementById('profileSubmitBtn');
  const err = document.getElementById('profileErrMsg');
  btn.disabled = true; btn.textContent = 'Submitting…'; err.textContent = '';

  const body = {
    id: session.enquiryId,
    propertyId: session.propId || 'ta-garden',
    fullName:          document.getElementById('pf-fullName').value.trim(),
    dateOfBirth:       document.getElementById('pf-dob').value,
    nationality:       document.getElementById('pf-nationality').value.trim(),
    passportNumber:    document.getElementById('pf-passport').value.trim(),
    passportExpiry:    document.getElementById('pf-expiry').value,
    homeAddress:       document.getElementById('pf-address').value.trim(),
    emergencyName:     document.getElementById('pf-emName').value.trim(),
    emergencyPhone:    document.getElementById('pf-emPhone').value.trim(),
    emergencyRelation: document.getElementById('pf-emRel').value.trim(),
    passport: passportData,
    visa:     visaData,
    sonFullName:      document.getElementById('pf-sonName')?.value.trim() || null,
    sonDateOfBirth:   document.getElementById('pf-sonDob')?.value || null,
    sonNationality:   document.getElementById('pf-sonNationality')?.value.trim() || null,
    sonPassportNumber: document.getElementById('pf-sonPassport')?.value.trim() || null,
    sonPassportExpiry: document.getElementById('pf-sonExpiry')?.value || null,
    sonVisa:          document.getElementById('pf-sonVisa')?.value.trim() || null,
  };

  if (!body.fullName || !body.dateOfBirth || !body.nationality || !body.passportNumber || !body.homeAddress || !body.emergencyName || !body.emergencyPhone) {
    err.textContent = 'Please fill in all required fields.';
    btn.disabled = false; btn.textContent = 'Submit Guest Profile →'; return;
  }

  try {
    const r = await fetch('/api/guest/submit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.success) {
      // Update local session
      session.profileSubmitted = true;
      session.profile = {
        fullName: body.fullName, nationality: body.nationality, dateOfBirth: body.dateOfBirth,
        passportNumber: body.passportNumber, homeAddress: body.homeAddress,
        emergencyName: body.emergencyName, emergencyPhone: body.emergencyPhone,
        emergencyRelation: body.emergencyRelation,
        passportUploaded: !!passportData, visaUploaded: !!visaData,
        submittedAt: new Date().toISOString(),
      };
      sessionStorage.setItem('tg_guest', JSON.stringify(session));
      // Re-render just the profile section
      document.getElementById('profileSection').innerHTML =
        '<div class="section-title">Guest Profile</div>' + renderProfileSection();
    } else throw new Error(d.error || 'Submission failed');
  } catch (ex) {
    err.textContent = 'Something went wrong: ' + ex.message + '. Please try again or email hi@soulandlunawellness.com';
    btn.disabled = false; btn.textContent = 'Submit Guest Profile →';
  }
}

function viewGuestContract() {
  const id = session?.enquiryId;
  const p  = session?.propId || 'ta-garden';
  if (!id) return;
  window.open(`/api/guest/contract?id=${id}&p=${p}`, '_blank');
}

async function submitContractSign() {
  const sig = (document.getElementById('contractSigInput')?.value || '').trim();
  const errEl = document.getElementById('contractSignError');
  if (!sig) { errEl.textContent = 'Please type your full name to sign.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  try {
    const r = await fetch('/api/guest/sign-contract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: session.enquiryId, propertyId: session.propId || 'ta-garden', signature: sig }),
    });
    const d = await r.json();
    if (d.success) {
      session.onboarding = { ...(session.onboarding || {}), contractSigned: true };
      session.signedAt = new Date().toISOString();
      sessionStorage.setItem('tg_guest', JSON.stringify(session));
      renderPortal();
    } else {
      errEl.textContent = d.error || 'Signing failed. Please try again.';
      errEl.style.display = 'block';
    }
  } catch (ex) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
  }
}
