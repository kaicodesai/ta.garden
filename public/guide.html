<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hội An Guide — Ta.Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #1a1a18;
  --cream: #ede0d1;
  --teal: #86a2a6;
  --mid: #88917d;
  --light: #f5f0eb;
  --white: #faf8f5;
  --green: #2d5a27;
  --red: #c0392b;
  --border: rgba(136,145,125,0.18);
  --cafe: #c8873a;
  --eat: #b84c4c;
  --vegan: #4a8c52;
  --wellness: #7b6fa0;
  --fitness: #2d6b8c;
  --shop: #8c6b2d;
  --culture: #2d7a6e;
}
html { scroll-behavior: smooth; }
body { font-family: 'Jost', Arial, sans-serif; background: var(--white); color: var(--dark); line-height: 1.7; }

/* Nav */
nav { background: var(--dark); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 400; }
.nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--cream); text-decoration: none; }
.nav-back { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--teal); text-decoration: none; }
.nav-back:hover { color: var(--cream); }

/* Hero */
.hero { background: var(--dark); padding: 52px 32px 48px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.06); }
.hero-label { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: 46px; font-weight: 300; color: var(--cream); margin-bottom: 16px; line-height: 1.1; }
.hero-sub { font-size: 14px; color: rgba(237,224,209,0.55); max-width: 520px; margin: 0 auto; line-height: 1.9; }

/* Filter bar */
.filter-wrap { background: var(--dark); border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 57px; z-index: 300; }
.filter-bar { display: flex; gap: 4px; padding: 12px 28px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid rgba(134,162,166,0.25);
  color: rgba(237,224,209,0.55);
  font-family: 'Jost', Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 7px 16px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--cream); border-color: var(--teal); }
.filter-btn.active { background: var(--teal); border-color: var(--teal); color: var(--dark); font-weight: 500; }

/* Map */
#map { width: 100%; height: 420px; background: #2a2e2a; }
.leaflet-popup-content-wrapper { background: var(--dark); border: 1px solid rgba(134,162,166,0.3); border-radius: 3px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.leaflet-popup-tip { background: var(--dark); }
.leaflet-popup-content { margin: 12px 14px; }
.popup-name { font-family: 'Jost', Arial, sans-serif; font-size: 13px; font-weight: 500; color: var(--cream); margin-bottom: 4px; }
.popup-cat { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
.popup-link { display: inline-block; font-size: 11px; color: var(--teal); text-decoration: none; border-bottom: 1px solid rgba(134,162,166,0.4); padding-bottom: 1px; transition: color 0.1s; }
.popup-link:hover { color: var(--cream); }
.leaflet-container a.leaflet-popup-close-button { color: var(--teal); top: 8px; right: 10px; }

/* Search */
.search-bar { max-width: 1240px; margin: 32px auto 0; padding: 0 24px; }
.search-input {
  width: 100%;
  background: var(--light);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 12px 18px;
  font-family: 'Jost', Arial, sans-serif;
  font-size: 14px;
  color: var(--dark);
  outline: none;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: rgba(26,26,24,0.35); }
.search-input:focus { border-color: var(--teal); }

/* Count */
.count-bar { max-width: 1240px; margin: 16px auto 0; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
.count-lbl { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); }

/* Cards */
.cards-wrap { max-width: 1240px; margin: 0 auto; padding: 20px 24px 80px; }
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.place-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: default;
}
.place-card:hover { border-color: var(--teal); box-shadow: 0 2px 12px rgba(134,162,166,0.12); }
.card-cat {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-family: Arial, sans-serif;
  color: var(--white);
  background: var(--teal);
  padding: 3px 8px;
  border-radius: 2px;
  width: fit-content;
}
.card-cat.cafe    { background: var(--cafe); }
.card-cat.eat     { background: var(--eat); }
.card-cat.vegan   { background: var(--vegan); }
.card-cat.wellness{ background: var(--wellness); }
.card-cat.fitness { background: var(--fitness); }
.card-cat.shop    { background: var(--shop); }
.card-cat.culture { background: var(--culture); }
.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--dark);
  line-height: 1.3;
}
.card-note {
  font-size: 12px;
  color: rgba(26,26,24,0.55);
  line-height: 1.6;
  flex: 1;
}
.card-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--teal);
  text-decoration: none;
  margin-top: auto;
  padding-top: 6px;
  border-top: 1px solid var(--border);
  transition: color 0.15s;
}
.card-link:hover { color: var(--dark); }
.card-link svg { width: 12px; height: 12px; transition: transform 0.15s; }
.place-card:hover .card-link svg { transform: translateX(2px); }

.no-results { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--mid); font-size: 14px; }

/* Footer */
footer { background: var(--dark); text-align: center; padding: 32px 20px; }
footer p { font-size: 11px; color: rgba(237,224,209,0.35); font-family: Arial, sans-serif; }
footer a { color: var(--teal); text-decoration: none; }

@media (max-width: 640px) {
  .hero-title { font-size: 34px; }
  nav { padding: 14px 20px; }
  .hero { padding: 40px 20px 36px; }
  #map { height: 300px; }
  .cards-wrap { padding: 16px 16px 60px; }
  .search-bar { padding: 0 16px; }
  .count-bar { padding: 0 16px; }
}
</style>
</head>

  { name: 'Precious Heritage Art Gallery Museum', cat: 'culture', note: 'Réhahn\'s stunning photography of Vietnam\'s ethnic minorities — free entry.', lat: 15.8773, lng: 108.3309, url: 'https://www.google.com/maps/place/Precious+Heritage+Art+Gallery+Museum/data=!4m2!3m1!1s0x31420dd5b5b29c61:0xf09543eb25ba142f' },
  { name: 'Hội An Lune Center for the Performing Arts', cat: 'culture', note: 'World-class performances in a stunning riverside venue.', lat: 15.8793, lng: 108.3363, url: 'https://www.google.com/maps/place/H%E1%BB%99i+An+Lune+Center+for+the+Performing+Arts/data=!4m2!3m1!1s0x31420e7e38509d01:0x6bc5e7726a81b4c5' },
  { name: 'Hội An Ancient Town (Old Town)',      cat: 'culture', note: 'The UNESCO-listed ancient town. Explore on foot at sunrise or dusk.', lat: 15.8800, lng: 108.3360, url: 'https://www.google.com/maps/place/Old+Town/data=!4m2!3m1!1s0x31420e7efc19667d:0x2f53b38bfba265bc' },
  { name: 'Cổng Chùa Bà Mụ',                    cat: 'culture', note: 'Ancient temple gate — a quiet, photogenic spot off the tourist trail.', lat: 15.8779, lng: 108.3303, url: 'https://www.google.com/maps/place/C%E1%BB%95ng+ch%C3%B9a+B%C3%A0+M%E1%BB%A5/data=!4m2!3m1!1s0x31420f000b629463:0xf1bd317bef32799f' },
];

// ── Cards + Filter + Search ───────────────────────────────────────
let activeCat = 'all';
let searchVal = '';
let map = null;
const markers = {};

function render() {
  const grid = document.getElementById('cardsGrid');
  const filtered = PLACES.filter(p => {
    const matchCat = activeCat === 'all' || p.cat === activeCat;
    const matchSearch = !searchVal || p.name.toLowerCase().includes(searchVal) || (p.note||'').toLowerCase().includes(searchVal);
    return matchCat && matchSearch;
  });

  document.getElementById('countLbl').textContent = filtered.length + ' place' + (filtered.length !== 1 ? 's' : '');

  // update map markers if map loaded
  if (map) {
    PLACES.forEach((p, i) => {
      if (!markers[i]) return;
      const show = (activeCat === 'all' || p.cat === activeCat) && (!searchVal || p.name.toLowerCase().includes(searchVal) || (p.note||'').toLowerCase().includes(searchVal));
      if (show) markers[i].addTo(map);
      else markers[i].remove();
    });
  }

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No places found. Try a different search or category.</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const catLabel = (CAT_LABELS[p.cat] || {}).label || p.cat;
    return `<div class="place-card" data-cat="${p.cat}">
      <span class="card-cat ${p.cat}">${catLabel}</span>
      <div class="card-name">${p.name}</div>
      ${p.note ? `<div class="card-note">${p.note}</div>` : ''}
      <a class="card-link" href="${p.url}" target="_blank" rel="noopener">
        View on Maps
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.5 9.5l7-7M4 2.5h5.5V8"/></svg>
      </a>
    </div>`;
  }).join('');
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchVal = e.target.value.trim().toLowerCase();
  render();
});

// Render cards immediately — independent of map
render();

// ── Map (initialised after cards, wrapped in try/catch) ──────────
function catColor(cat) { return (CAT_LABELS[cat] || {}).color || '#86a2a6'; }

function makeIcon(cat) {
  const c = catColor(cat);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32"><path fill="${c}" stroke="rgba(0,0,0,0.4)" stroke-width="1" d="M12 0C5.373 0 0 5.373 0 12c0 9 12 20 12 20s12-11 12-20C24 5.373 18.627 0 12 0z"/><circle cx="12" cy="12" r="5" fill="white" opacity="0.9"/></svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [24, 32], iconAnchor: [12, 32], popupAnchor: [0, -34] });
}

try {
  map = L.map('map', { zoomControl: true }).setView([15.8820, 108.3380], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  PLACES.forEach((p, i) => {
    if (!p.lat || !p.lng) return;
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.cat) }).addTo(map);
    const catLabel = (CAT_LABELS[p.cat] || {}).label || p.cat;
    m.bindPopup(`
      <div class="popup-name">${p.name}</div>
      <div class="popup-cat">${catLabel}</div>
      <a class="popup-link" href="${p.url}" target="_blank" rel="noopener">View on Google Maps →</a>
    `);
    markers[i] = m;
  });
} catch(e) {
  document.getElementById('map').style.display = 'none';
}
</script>
</body>
</html>
